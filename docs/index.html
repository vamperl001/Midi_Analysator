<!DOCTYPE html>
<html lang="de">
<head><meta charset="utf-8"><title>Dokumentation</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{font-family:system-ui,sans-serif;max-width:800px;margin:2em auto;padding:0 1em;background:#0f172a;color:#e2e8f0}a{color:#818cf8}pre{background:#1e293b;padding:1em;border-radius:6px;overflow-x:auto}code{background:#1e293b;padding:.15em .3em;border-radius:3px;font-size:.9em}table{border-collapse:collapse;width:100%}td,th{border:1px solid #334155;padding:.4em .6em;text-align:left}h1,h2,h3,h4{margin-top:2em;color:#f1f5f9}img{max-width:100%}nav{margin-bottom:2em;display:flex;gap:1em;font-size:.9em}nav a{background:#1e293b;padding:.3em .6em;border-radius:4px;text-decoration:none}nav a:hover{background:#334155}hr{margin:2em 0;border:none;border-top:1px solid #334155}</style>
</head>
<body>
<nav>
  <a href="/doku/?file=entwicklungsprozess.md">Entwicklungsprozess</a>
  <a href="/doku/?file=roadmap.md">Roadmap</a>
  <a href="/">App</a>
</nav>
<div id="md-content"><p>Lade...</p></div>
<script src="/doku/marked.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
const file = params.get('file') || 'entwicklungsprozess.md';
document.title = 'Doku – ' + file.replace('.md','');
fetch('/doku/' + file).then(r => { if (!r.ok) throw new Error(r.status); return r.text(); }).then(md => {
  document.getElementById('md-content').innerHTML = marked.parse(md);
}).catch(() => {
  document.getElementById('md-content').innerHTML = '<p>Datei nicht gefunden.</p>';
});
</script>
</body>
</html>
